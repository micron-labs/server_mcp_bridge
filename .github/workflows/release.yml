name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: ubuntu-22.04
            image: ubuntu:22.04
          - distro: ubuntu-24.04
            image: ubuntu:24.04
          - distro: debian-12
            image: debian:12

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev \
            debhelper devscripts \
            git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Update changelog version
          sed -i "1s/(.*)/($VERSION-1)/" debian/changelog

      - name: Build .deb package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Rename and collect artifact
        run: |
          mkdir -p dist
          cp ../*.deb dist/
          # Rename to include distro
          for f in dist/*.deb; do
            newname=$(echo "$f" | sed "s/_amd64/_${{ matrix.distro }}_amd64/")
            mv "$f" "$newname"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.distro }}
          path: dist/*.deb

  build-binary:
    name: Build static binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mcp-bridge-linux-amd64
          - os: windows-latest
            artifact: mcp-bridge-windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev pkg-config
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DENABLE_SSL=ON -DENABLE_MYSQL=OFF -DENABLE_POSTGRES=OFF
          cmake --build build
          strip build/mcp_bridge
          mkdir dist
          cp build/mcp_bridge dist/${{ matrix.artifact }}
          cp etc/mcp_bridge/mcp.json.template dist/

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DENABLE_SSL=OFF -DENABLE_MYSQL=OFF -DENABLE_POSTGRES=OFF "-DCMAKE_CXX_FLAGS_RELEASE=/O2 /DMCP_BRIDGE_PRODUCTION=1"
          cmake --build build --config Release --target mcp_bridge mcp_bridge_priv
          mkdir dist
          copy build\Release\mcp_bridge.exe       dist\${{ matrix.artifact }}.exe
          copy build\Release\mcp_bridge_priv.exe  dist\${{ matrix.artifact }}-priv.exe
          copy etc\mcp_bridge\mcp.json.template   dist\
          copy installer\mcp_bridge-cron-runner.ps1 dist\

      - name: Generate SHA256 sidecars (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          for f in mcp-bridge-*; do sha256sum "$f" > "$f.sha256"; done

      - name: Generate SHA256 sidecars (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Get-ChildItem -File -Filter "*.exe" | ForEach-Object {
            $h = (Get-FileHash -Algorithm SHA256 -Path $_.FullName).Hash.ToLower()
            "$h  $($_.Name)" | Set-Content -Encoding ascii -NoNewline ($_.FullName + ".sha256")
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact }}
          path: dist/

  build-msi:
    name: Build Windows MSI installer
    needs: [build-binary]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: binary-mcp-bridge-windows-amd64
          path: payload

      - name: Set version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "VERSION=$v" | Out-File -Append -FilePath $env:GITHUB_ENV
          # WiX rejects leading-zero / pre-release suffixes; strip them for the
          # ProductVersion attribute. Releases tagged v2.0.0~rc1-1 publish as
          # MSI version 2.0.0; the suffix lives in the file name only.
          $msi = ($v -replace '~.*$','') -replace '-.*$',''
          "MSI_VERSION=$msi" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Build MSI
        shell: pwsh
        env:
          PAYLOAD_DIR: ${{ github.workspace }}\payload
        run: |
          # WiX 3.x ships preinstalled on windows-latest as candle.exe / light.exe.
          $wix = "$env:WIX\bin"
          if (-not (Test-Path $wix)) { $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin" }
          if (-not (Test-Path $wix)) { $wix = "C:\Program Files (x86)\WiX Toolset v3.11\bin" }
          $env:Path = "$wix;$env:Path"
          mkdir build-msi
          & candle.exe -nologo "-dProductVersion=$env:MSI_VERSION" "-dPayloadDir=$env:PAYLOAD_DIR" -arch x64 -out build-msi\mcp_bridge.wixobj installer\wix\mcp_bridge.wxs
          & light.exe -nologo -ext WixUIExtension -out "build-msi\mcp-bridge-$env:VERSION-windows-amd64.msi" build-msi\mcp_bridge.wixobj
          mkdir dist-msi
          copy "build-msi\mcp-bridge-$env:VERSION-windows-amd64.msi" dist-msi\
          $msi = "dist-msi\mcp-bridge-$env:VERSION-windows-amd64.msi"
          $h = (Get-FileHash -Algorithm SHA256 -Path $msi).Hash.ToLower()
          "$h  $((Get-Item $msi).Name)" | Set-Content -Encoding ascii -NoNewline ($msi + ".sha256")

      # Authenticode signing is gated on the SIGNING_PFX_BASE64 +
      # SIGNING_PFX_PASSWORD repo secrets being set. Without them the MSI
      # ships unsigned and SmartScreen will warn — see installer/release.md.
      - name: Sign MSI (when signing cert is available)
        if: ${{ secrets.SIGNING_PFX_BASE64 != '' }}
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.SIGNING_PFX_BASE64 }}
          PFX_PASS: ${{ secrets.SIGNING_PFX_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes('signing.pfx', [Convert]::FromBase64String($env:PFX_B64))
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          if (-not (Test-Path $signtool)) {
            $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' | Select-Object -Last 1).FullName
          }
          & $signtool sign /f signing.pfx /p $env:PFX_PASS /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist-msi\*.msi
          Remove-Item signing.pfx
          # Re-hash after signing so the sidecar matches.
          Get-ChildItem dist-msi\*.msi | ForEach-Object {
            $h = (Get-FileHash -Algorithm SHA256 -Path $_.FullName).Hash.ToLower()
            "$h  $($_.Name)" | Set-Content -Encoding ascii -NoNewline ($_.FullName + ".sha256")
          }

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: msi-windows-amd64
          path: dist-msi/

  release:
    name: Create GitHub Release
    needs: [build-deb, build-binary, build-msi]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( \
              -name "*.deb" -o -name "*.deb.sha256" \
              -o -name "mcp-bridge-*" -o -name "*.exe" -o -name "*.exe.sha256" \
              -o -name "*.msi" -o -name "*.msi.sha256" \
              -o -name "mcp_bridge-cron-runner.ps1" \
           \) -exec cp {} release/ \;
          # Generate sidecars for any .deb that didn't come with one.
          for f in release/*.deb; do
            [ -e "$f" ] || continue
            [ -f "$f.sha256" ] || sha256sum "$f" > "$f.sha256"
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Installation

            ### Debian/Ubuntu (.deb)

            Download the `.deb` for your distro and install:

            ```bash
            sudo apt install ./mcp-bridge_*_amd64.deb
            ```

            The service is installed at `/usr/bin/mcp_bridge` with config at `/etc/mcp_bridge/env`.
            An API key is auto-generated on first install.

            ```bash
            # View your API key
            sudo grep API_KEY /etc/mcp_bridge/env

            # Start the service
            sudo systemctl start mcp-bridge
            sudo systemctl enable mcp-bridge
            ```

            ### Linux (standalone binary)

            For non-`.deb` installs, copy `mcp.json.template` to a path of your
            choice, fill in `auth.global_token_salt` + `auth.admin_token_hash`
            (sha256-of-(salt||token), see README), then:

            ```bash
            chmod +x mcp-bridge-linux-amd64
            ./mcp-bridge-linux-amd64 daemon --config /etc/mcp_bridge/mcp.json
            ```

            ### Windows (recommended: MSI)

            Download `mcp-bridge-<version>-windows-amd64.msi` and run it
            (or `msiexec /i <file>.msi /qb` for unattended). The installer
            registers two services: `mcp-bridge` (the daemon, low priv) and
            `mcp_bridge_priv` (LocalSystem, named-pipe RPC). The admin token
            is generated and printed to the verbose install log on first
            install.

            > Heads-up: until an Authenticode cert is provisioned, the MSI
            > is unsigned and SmartScreen will warn. Verify the `.sha256`
            > sidecar against the file before running.

            ### Windows (PowerShell installer)

            For a curl-pipe-bash equivalent UX:

            ```powershell
            irm https://github.com/TheParadox20/server-mcp-bridge/releases/latest/download/install.ps1 | iex
            ```

            Or inspect first:

            ```powershell
            iwr -useb https://.../install.ps1 | Out-File install.ps1
            powershell -ExecutionPolicy Bypass -File install.ps1
            ```

            ### Windows (standalone .exe)

            For ad-hoc / unmanaged use, ship `mcp-bridge-windows-amd64.exe`
            and `mcp-bridge-windows-amd64-priv.exe` together. The daemon
            requires the priv service for any `run_command` call (the
            named-pipe client is the gate).

            ```powershell
            .\mcp-bridge-windows-amd64.exe daemon --config C:\path\to\mcp.json
            ```

  publish-apt:
    name: Publish to apt repository
    needs: [release]
    runs-on: ubuntu-latest
    if: ${{ vars.PACKAGECLOUD_REPO != '' }}

    steps:
      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: debs

      - name: Install packagecloud CLI
        run: gem install package_cloud

      - name: Push to packagecloud
        env:
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}
          PACKAGECLOUD_REPO: ${{ vars.PACKAGECLOUD_REPO }}
        run: |
          find debs -name "*.deb" | while read deb; do
            filename=$(basename "$deb")
            if echo "$filename" | grep -q "ubuntu-22.04"; then
              package_cloud push "$PACKAGECLOUD_REPO/ubuntu/jammy" "$deb"
            elif echo "$filename" | grep -q "ubuntu-24.04"; then
              package_cloud push "$PACKAGECLOUD_REPO/ubuntu/noble" "$deb"
            elif echo "$filename" | grep -q "debian-12"; then
              package_cloud push "$PACKAGECLOUD_REPO/debian/bookworm" "$deb"
            fi
          done
